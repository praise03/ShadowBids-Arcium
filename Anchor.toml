[toolchain]
package_manager = "yarn"

[features]
resolution = true
skip-lint = false

[programs.devnet]
shadow_bid = "F4tKBoryaS7kaQH2Hh1CxrQDRz4HRipVEztf5p5cT5wf"

[programs.localnet]
shadow_bid = "F4tKBoryaS7kaQH2Hh1CxrQDRz4HRipVEztf5p5cT5wf"

[registry]
